name: Build Android

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src-tauri/**'
      - 'cinny/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-android.yml'

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
        with:
          submodules: true

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4.5.0
        with:
          node-version-file: '.node-version'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-linux-android,
            armv7-linux-androideabi,
            i686-linux-android,
            x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@07976c6290703d34c16d382cb36445f98bb43b1f # v3.2.2
        with:
          packages: 'platforms;android-36 build-tools;35.0.0 ndk;27.0.12077973'

      - name: Install cinny dependencies
        run: cd cinny && npm ci

      - name: Install tauri dependencies
        run: npm ci

      - name: Build Android APK
        run: |
          export NDK_HOME="$ANDROID_HOME/ndk/27.0.12077973"
          npx tauri android build

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" \
            -storepass android -keypass android

      - name: Sign APK
        run: |
          $ANDROID_HOME/build-tools/35.0.0/apksigner sign \
            --ks debug.keystore --ks-pass pass:android \
            --ks-key-alias androiddebugkey --key-pass pass:android \
            --out cinny-android-universal.apk \
            src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk

      - name: Upload signed APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cinny-android-apk
          path: cinny-android-universal.apk
          if-no-files-found: error
