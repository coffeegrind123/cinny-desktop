name: Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  release:
    types: [published]

jobs:
  # ── Auto-create release from tag ──────────────────────────────────
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            echo "Initial release." >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            git log --oneline --no-merges "${PREV_TAG}..HEAD" | sed 's/^/- /' >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Delete old versioned releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          gh api "repos/${{ github.repository }}/releases" --jq '.[] | select(.tag_name | startswith("v")) | select(.tag_name != $ENV.CURRENT_TAG) | .id' | while read id; do
            echo "Deleting old release $id"
            gh api -X DELETE "repos/${{ github.repository }}/releases/$id" --silent
          done

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Prinny Client ${{ github.ref_name }}" \
            --notes "${{ steps.notes.outputs.notes }}"

  # ── Windows x86_64 ──────────────────────────────────────────────
  windows-x86_64:
    needs: [create-release]
    if: success() || (needs.create-release.result == 'skipped')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - uses: dtolnay/rust-toolchain@stable

      - name: Install cinny dependencies
        run: cd cinny && npm ci
      - name: Install tauri dependencies
        run: npm ci

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@73fb865345c54760d875b94642314f8c0c894afa # v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max_old_space_size=4096
        with:
          args: --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Get version
        shell: pwsh
        run: |
          $json = (Get-Content "src-tauri\tauri.conf.json" -Raw) | ConvertFrom-Json
          "TAURI_VERSION=$($json.version)" >> $Env:GITHUB_ENV

      - name: Rename artifacts
        shell: pwsh
        run: |
          Move-Item "src-tauri\target\release\bundle\msi\Prinny_${{ env.TAURI_VERSION }}_x64_en-US.msi" "src-tauri\target\release\bundle\msi\Prinny_desktop-x86_64.msi"
          Move-Item "src-tauri\target\release\bundle\nsis\Prinny_${{ env.TAURI_VERSION }}_x64-setup.exe" "src-tauri\target\release\bundle\nsis\Prinny_desktop-x86_64-setup.exe"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: prinny-windows-x86_64
          path: |
            src-tauri/target/release/bundle/msi/Prinny_desktop-x86_64.msi
            src-tauri/target/release/bundle/nsis/Prinny_desktop-x86_64-setup.exe
          if-no-files-found: error

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            src-tauri/target/release/bundle/msi/Prinny_desktop-x86_64.msi
            src-tauri/target/release/bundle/nsis/Prinny_desktop-x86_64-setup.exe

  # ── Linux x86_64 ────────────────────────────────────────────────
  linux-x86_64:
    needs: [create-release]
    if: success() || (needs.create-release.result == 'skipped')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install cinny dependencies
        run: cd cinny && npm ci
      - name: Install tauri dependencies
        run: npm ci

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@73fb865345c54760d875b94642314f8c0c894afa # v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max_old_space_size=4096
        with:
          args: --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Get version
        id: vars
        run: echo "tag=$(jq .version src-tauri/tauri.conf.json | tr -d '"')" >> $GITHUB_OUTPUT

      - name: Rename artifacts
        run: |
          mv "src-tauri/target/release/bundle/deb/Prinny_${{ steps.vars.outputs.tag }}_amd64.deb" "src-tauri/target/release/bundle/deb/Prinny_desktop-x86_64.deb"
          mv "src-tauri/target/release/bundle/appimage/Prinny_${{ steps.vars.outputs.tag }}_amd64.AppImage" "src-tauri/target/release/bundle/appimage/Prinny_desktop-x86_64.AppImage"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: prinny-linux-x86_64
          path: |
            src-tauri/target/release/bundle/deb/Prinny_desktop-x86_64.deb
            src-tauri/target/release/bundle/appimage/Prinny_desktop-x86_64.AppImage
          if-no-files-found: error

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            src-tauri/target/release/bundle/deb/Prinny_desktop-x86_64.deb
            src-tauri/target/release/bundle/appimage/Prinny_desktop-x86_64.AppImage

  # ── macOS universal ─────────────────────────────────────────────
  macos-universal:
    needs: [create-release]
    if: success() || (needs.create-release.result == 'skipped')
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install cinny dependencies
        run: cd cinny && npm ci
      - name: Install tauri dependencies
        run: npm ci

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@73fb865345c54760d875b94642314f8c0c894afa # v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max_old_space_size=4096
        with:
          args: --target universal-apple-darwin --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Get version
        id: vars
        run: echo "tag=$(jq .version src-tauri/tauri.conf.json | tr -d '"')" >> $GITHUB_OUTPUT

      - name: Rename artifacts
        run: |
          mv "src-tauri/target/universal-apple-darwin/release/bundle/dmg/Prinny_${{ steps.vars.outputs.tag }}_universal.dmg" "src-tauri/target/universal-apple-darwin/release/bundle/dmg/Prinny_desktop-universal.dmg"
          mv "src-tauri/target/universal-apple-darwin/release/bundle/macos/Prinny.app.tar.gz" "src-tauri/target/universal-apple-darwin/release/bundle/macos/Prinny_desktop-universal.app.tar.gz"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: prinny-macos-universal
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/Prinny_desktop-universal.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/Prinny_desktop-universal.app.tar.gz
          if-no-files-found: error

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/Prinny_desktop-universal.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/Prinny_desktop-universal.app.tar.gz

  # ── Android universal APK ───────────────────────────────────────
  android:
    needs: [create-release]
    if: success() || (needs.create-release.result == 'skipped')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-linux-android,
            armv7-linux-androideabi,
            i686-linux-android,
            x86_64-linux-android

      - uses: android-actions/setup-android@07976c6290703d34c16d382cb36445f98bb43b1f # v3.2.2
        with:
          packages: platforms;android-36 build-tools;35.0.0 ndk;27.0.12077973

      - name: Install cinny dependencies
        run: cd cinny && npm ci
      - name: Install tauri dependencies
        run: npm ci

      - name: Build Android APK
        run: |
          export NDK_HOME="$ANDROID_HOME/ndk/27.0.12077973"
          CARGO_BUILD_JOBS=1 npx tauri android build

      - name: Sign APK
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" \
            -storepass android -keypass android
          $ANDROID_HOME/build-tools/35.0.0/apksigner sign \
            --ks debug.keystore --ks-pass pass:android \
            --ks-key-alias androiddebugkey --key-pass pass:android \
            --out prinny-android-universal.apk \
            src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk
          sha256sum prinny-android-universal.apk > prinny-android-universal.apk.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: prinny-android-universal
          path: |
            prinny-android-universal.apk
            prinny-android-universal.apk.sha256
          if-no-files-found: error

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            prinny-android-universal.apk
            prinny-android-universal.apk.sha256

  # ── Source archive ──────────────────────────────────────────────
  archive:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
    needs: [create-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: true
      - name: Create source zip
        run: |
          cd ..
          zip ${{ github.event.repository.name }}/${{ github.event.repository.name }}-${{ github.ref_name }}.zip ${{ github.event.repository.name }} -r
      - name: Upload to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            ${{ github.event.repository.name }}-${{ github.ref_name }}.zip

  # ── Release update metadata ─────────────────────────────────────
  release-update:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
    needs: [windows-x86_64, linux-x86_64, macos-universal, android, create-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install dependencies
        run: npm ci
      - name: Generate release.json
        run: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
